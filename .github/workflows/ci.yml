name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  root:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install server dependencies
        run: npm --prefix server ci

      - name: Lint root workspace
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Run root tests
        run: npm test

  server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install server dependencies
        run: npm --prefix server ci

      - name: Typecheck server
        run: npm --prefix server run typecheck

      - name: Build server
        run: npm --prefix server run build

      - name: Test server
        run: npm --prefix server test
